<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>

    body{
      background:black;
      color:white;
      text-align:center;
      font-family:Arial;
      margin-top:100px;
    }

    h1{
      font-size:45px;
    }

    #clock{
      font-size:35px;
      color:yellow;
      margin-top:30px;
    }

  </style>
</head>

<body>

<h1>WELCOME</h1>

<div id="clock"></div>

<script>

function updateClock(){

  let now = new Date();

  let time = now.toLocaleTimeString();

  document.getElementById("clock").innerHTML = time;

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
