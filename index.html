<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Engine - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* லாகின் மற்றும் லாகவுட் டிசைன் */
        #loginPanel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #mainContainer { display: none; } /* ஆரம்பத்தில் வெப்சைட் மறைக்கப்பட்டு இருக்கும் */
        
        .header-container {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a237e;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: auto; /* மெயின் பட்டன் போல முழு நீளத்திற்கு வராமல் தடுக்க */
        }
        .logout-btn:hover { background: #c82333; }
    </style>
</head>
<body>

<div id="loginPanel" class="container">
    <div class="panel" style="width: 300px; text-align: center;">
        <h3>🔒 Secure Login</h3>
        <input type="password" id="passwordInput" placeholder="Enter Password" style="margin-bottom: 10px;" onkeypress="handleKeyPress(event)">
        <button onclick="checkLogin()">LOGIN</button>
        <p id="errorMsg" style="color: red; font-size: 12px; margin-top: 5px;"></p>
    </div>
</div>

<div id="mainContainer" class="container">
    <div class="header-container">
        <h2 style="margin: 0; font-size: 20px;">🎯 Multi-Speciality 3-Digit Lottery Pattern & Prediction Engine</h2>
        <button class="logout-btn" onclick="logout()">Logout 🚪</button>
    </div>

    <div class="panel" id="inputPanel">
        <h3 id="formTitle">1. Data Input (தரவு உள்ளீடு)</h3>
        <form id="lotteryForm">
            <div class="form-group">
                <label>Date (தேதி)</label>
                <input type="date" id="gameDate" required>
            </div>
            <div class="form-group">
                <label>Time (நேரம்)</label>
                <input type="time" id="gameTime" required>
            </div>
            <div class="form-group">
                <label>Game Number (கேம் எண்)</label>
                <input type="number" id="gameId" placeholder="Ex: 01, 02" required>
            </div>
            <div class="form-group">
                <label>3-Digit Number (மூன்றிலக்க எண்)</label>
                <div class="digit-inputs">
                    <input type="text" id="d1" maxlength="1" required oninput="moveNext(this, 'd2')">
                    <input type="text" id="d2" maxlength="1" required oninput="moveNext(this, 'd3')">
                    <input type="text" id="d3" maxlength="1" required>
                </div>
            </div>
            <button type="submit" id="submitBtn">SAVE & ANALYZE</button>
            <button type="button" class="clear-btn" onclick="clearAllData()">RESET DATABASE</button>
        </form>
    </div>

    <div class="results-panel">
        <div class="panel"><h3>🔮 AI Smart Guesses</h3>
            <div class="prediction-box" id="predictionContainer"><div class="pred-num">---</div><div class="pred-num">---</div><div class="pred-num">---</div></div>
        </div>
        <div class="panel"><h3>⚡ Pattern Discovery Engine</h3>
            <div id="patternAnalysis" class="scrollable"></div>
        </div>
        <div class="panel"><h3>📊 Saved Database</h3>
            <div class="scrollable">
                <table class="grid-table">
                    <thead><tr><th>Date & Time</th><th>Game</th><th>Number</th><th>Neighbors</th><th>Action</th></tr></thead>
                    <tbody id="dataTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    let logoutTimer;
    const INACTIVITY_LIMIT = 10 * 60 * 1000; // 10 நிமிடங்கள் (மில்லிசெகண்டுகளில்)

    // Enter கீ பிரஸ் செய்தால் லாகின் ஆக
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            checkLogin();
        }
    }

    // லாகின் செக் செய்ய
    function checkLogin() {
        const pass = document.getElementById('passwordInput').value;
        if(pass === "16111996") {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'grid';
            document.getElementById('passwordInput').value = ""; // பாஸ்வேர்டை கிளியர் செய்ய
            document.getElementById('errorMsg').innerText = "";
            
            // ஆட்டோ லாகவுட் டைமரைத் தொடங்கவும்
            startInactivityTimer();
        } else {
            document.getElementById('errorMsg').innerText = "❌ தவறான கடவுச்சொல்!";
        }
    }

    // மேனுவல் லாகவுட்
    function logout() {
        resetInactivityTimer();
        document.getElementById('mainContainer').style.display = 'none';
        document.getElementById('loginPanel').style.display = 'flex';
    }

    // ஆட்டோ லாகவுட் டைமர் லாஜிக்
    function startInactivityTimer() {
        // பயனர் வெப்சைட்டில் ஏதேனும் ஆக்டிவிட்டி செய்கிறாரா என்று கண்காணிப்பது
        window.onload = resetInactivityTimer;
        window.onmousemove = resetInactivityTimer;
        window.onmousedown = resetInactivityTimer; // கிளிக்ஸ்
        window.ontouchstart = resetInactivityTimer; // மொபைல் டச்
        window.onclick = resetInactivityTimer;     
        window.onkeypress = resetInactivityTimer;   // டைப்பிங்
        
        setTimer();
    }

    function setTimer() {
        // 10 நிமிடம் கழித்து லாகவுட் செய்யும் பங்க்ஷன்
        logoutTimer = setTimeout(function() {
            alert("⏰ 10 நிமிடங்கள் நீங்கள் எந்தவொரு வேலையும் செய்யாததால் பாதுகாப்பு கருதி ஆட்டோமேட்டிக்காக லாகவுட் செய்யப்பட்டுள்ளது!");
            logout();
        }, INACTIVITY_LIMIT);
    }

    function resetInactivityTimer() {
        // யூசர் ஏதேனும் வேலை செய்தால் பழைய டைமரை அழித்துவிட்டு புதிய 10 நிமிட டைமரைத் தொடங்கும்
        clearTimeout(logoutTimer);
        // யூசர் லாகின் செய்திருந்தால் மட்டுமே மீண்டும் டைமரை செட் செய்ய வேண்டும்
        if (document.getElementById('mainContainer').style.display === 'grid') {
            setTimer();
        }
    }
</script>
</body>
</html>
