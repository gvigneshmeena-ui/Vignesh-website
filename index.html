<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigneshmeniia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1 id="mainTitle">Vignesiiiih</h1>

  <div class="buttons">
    <button onclick="showSignup()">Creaooote Account</button>
    <button onclick="showSignin()">Sign In</button>
  </div>

  <!-- SIGNUP -->
  <div class="form-box" id="signupBox">

    <h2>Create Account</h2>

    <input type="text" id="signupMobile" placeholder="Mobile Number">

    <input type="password" id="signupPassword" placeholder="Password">

    <input type="password" id="signupConfirm" placeholder="Confirm Password">

    <div class="otp-box">
      <button onclick="generateOTP()">Get OTP</button>
      <span id="otpDisplay"></span>
    </div>

    <input type="text" id="otpInput" placeholder="Enter OTP">

    <button onclick="createAccount()">Create Account</button>

  </div>

  <!-- SIGNIN -->
  <div class="form-box" id="signinBox">

    <h2>Sign In</h2>

    <input type="text" id="signinMobile" placeholder="Mobile Number">

    <input type="password" id="signinPassword" placeholder="Password">

    <button onclick="signin()">Sign In</button>

  </div>

</div>

<script src="script.js"></script>

</body>
