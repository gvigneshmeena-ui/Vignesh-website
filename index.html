
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottery Pattern Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Lottery Pattern Analyzer</h1>

  <div class="card">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter username">
    <button onclick="login()">Login</button>
  </div>

  <div class="card">
    <h2>Add Result</h2>
    <input type="date" id="date">
    <input type="time" id="time">
    <input type="number" id="result" placeholder="3 digit result" maxlength="3">
    <button onclick="saveResult()">Save Result</button>
  </div>

  <div class="card">
    <h2>Prediction</h2>
    <button onclick="analyze()">Run Analysis</button>
    <div id="prediction"></div>
  </div>

  <div class="card">
    <h2>Saved Results</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
